<table>
  <thead><tr><th>Date</th><th>Ticker</th><th>Qty</th><th>Price</th><th>Fees</th></tr></thead>
  <tbody>
  {% for tx in transactions %}
    <tr>
      <td>{{ tx.date }}</td>
      <td>{{ tx.ticker }}</td>
      <td>{{ tx.quantity }}</td>
      <td>{{ tx.price }}</td>
      <td>{{ tx.fees }}</td>
    </tr>
  {% else %}
    <tr><td colspan="5">No transactions</td></tr>
  {% endfor %}
  </tbody>
</table>
